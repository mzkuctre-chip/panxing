<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>判型数据库</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1a1a'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='36' font-family='PingFang SC,sans-serif' fill='white'%3E型%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1a1a'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='36' font-family='PingFang SC,sans-serif' fill='white'%3E型%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== 填入你的配置 ===== */
/* 在下方 JS 里修改 SUPABASE_URL 和 SUPABASE_KEY */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg2: #f7f7f5;
  --bg3: #f0efea;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --radius: 8px;
  --radius-lg: 12px;
  --info-bg: #e6f1fb;
  --info-text: #0c447c;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --bg2: #222; --bg3: #2a2a2a;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --text: #f0f0f0; --text2: #aaa; --text3: #666;
    --info-bg: #0c2a42; --info-text: #7bbcf5;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
#app { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1rem; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; }
.dot.offline { background: #ef4444; }
.dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* toolbar */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.toolbar input[type=text] { flex: 1; min-width: 180px; padding: 7px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.toolbar input:focus { border-color: var(--info-text); box-shadow: 0 0 0 2px var(--info-bg); }
button { padding: 7px 14px; font-size: 13px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); transition: all .15s; }
button:hover { background: var(--bg2); }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-primary:hover { opacity: .8; }
.btn-danger { color: #ef4444; border-color: #ef4444; }
.btn-danger:hover { background: #fef2f2; }

/* filters */
.filters { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 10px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 5px 0; }
.filter-row:not(:last-child) { border-bottom: 0.5px solid var(--border); padding-bottom: 8px; margin-bottom: 3px; }
.filter-label { font-size: 11px; color: var(--text3); min-width: 52px; flex-shrink: 0; }
.chip { font-size: 11px; padding: 3px 9px; border-radius: 10px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); white-space: nowrap; transition: all .1s; user-select: none; }
.chip:hover { background: var(--bg2); }
.chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }
.chip.on.multi { background: #eeedfe; color: #3c3489; border-color: #afa9ec; }
.filter-actions { margin-left: auto; }

/* stats */
.stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 14px; font-size: 12px; color: var(--text2); }
.stat strong { font-size: 16px; font-weight: 500; color: var(--text); display: block; }

/* status bar */
.statusbar { font-size: 12px; color: var(--text3); margin-bottom: 6px; min-height: 18px; }

/* table */
.tbl-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
th { background: var(--bg2); padding: 8px 10px; text-align: left; font-weight: 500; border-bottom: 0.5px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 2; font-size: 12px; color: var(--text2); }
th:hover { background: var(--bg3); }
.sort-arrow { font-size: 10px; margin-left: 2px; color: var(--text3); }
td { padding: 6px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg2); }
td[contenteditable=true] { cursor: text; }
td[contenteditable=true]:focus { outline: 2px solid var(--info-text); outline-offset: -2px; background: var(--info-bg); white-space: normal; overflow: visible; max-width: none; }
td.saving { opacity: .6; }

/* badges */
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.b-star  { background: #eeedfe; color: #3c3489; }
.b-pub   { background: #e1f5ee; color: #085041; }
.b-net   { background: #faeeda; color: #633806; }
.b-role  { background: #faece7; color: #712b13; }
.b-wri   { background: #fbeaf0; color: #72243e; }
.b-other { background: var(--bg2); color: var(--text2); }
.mb { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.mb-y { background: #faeeda; color: #633806; }
.mb-g { background: #eaf3de; color: #27500a; }
.mb-p { background: #eeedfe; color: #3c3489; }
.mb-b { background: #e6f1fb; color: #0c447c; }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 6px; font-size: 15px; border-radius: 4px; }
.del-btn:hover { color: #ef4444; background: #fef2f2; }

/* modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; }
.modal-overlay.open { display: flex; align-items: center; justify-content: center; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
.form-row { margin-bottom: 10px; }
.form-row label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }
.form-row input, .form-row select { width: 100%; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.form-row input:focus { border-color: var(--info-text); box-shadow: 0 0 0 2px var(--info-bg); }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

/* import banner */
.import-banner { background: var(--info-bg); border: 0.5px solid var(--info-text); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: var(--info-text); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
</style>
</head>
<body>
<div id="app">
  <h1>
    <span class="dot loading" id="conn-dot"></span>
    判型数据库
    <span id="conn-label" style="font-size:12px;color:var(--text3);font-weight:400">连接中...</span>
  </h1>

  <div id="import-banner" class="import-banner" style="display:none">
    数据库为空，是否导入初始数据（121条）？
    <button class="btn-primary" onclick="importInitial()" style="white-space:nowrap">一键导入</button>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="搜索姓名、Tritype、来自...">
    <button class="btn-primary" onclick="openAdd()">+ 添加</button>
    <button onclick="loadData()">刷新</button>
  </div>

  <div class="filters" id="filters">
    <div class="filter-row">
      <span class="filter-label">身份</span>
      <div id="f-shenfen"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">MBTI</span>
      <div id="f-mbti"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">SOC型</span>
      <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">
        <span style="font-size:10px;color:var(--text3);padding:2px 4px">α</span>
        <div id="f-soc-a" style="display:contents"></div>
        <span style="font-size:10px;color:var(--text3);padding:2px 6px 2px 10px">β</span>
        <div id="f-soc-b" style="display:contents"></div>
        <span style="font-size:10px;color:var(--text3);padding:2px 6px 2px 10px">γ</span>
        <div id="f-soc-g" style="display:contents"></div>
        <span style="font-size:10px;color:var(--text3);padding:2px 6px 2px 10px">δ</span>
        <div id="f-soc-d" style="display:contents"></div>
      </div>

    </div>
    <div class="filter-row">
      <span class="filter-label">九型</span>
      <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">
        <span style="font-size:10px;color:var(--text3);padding:2px 4px">腹区</span>
        <div id="f-e9-gut" style="display:contents"></div>
        <span style="font-size:10px;color:var(--text3);padding:2px 6px 2px 10px">心区</span>
        <div id="f-e9-heart" style="display:contents"></div>
        <span style="font-size:10px;color:var(--text3);padding:2px 6px 2px 10px">脑区</span>
        <div id="f-e9-head" style="display:contents"></div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">本能副型</span>
      <div id="f-inst"></div>
      <span class="filter-label" style="margin-left:16px">五行</span>
      <div id="f-wx"></div>
      <span class="filter-label" style="margin-left:16px">星座</span>
      <div id="f-star"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">态度类型</span>
      <div id="f-attitude"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">爱之心理</span>
      <div id="f-love"></div>
      <div class="filter-actions">
        <button onclick="clearFilters()" style="font-size:11px;padding:3px 10px">清除筛选</button>
      </div>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="statusbar" id="statusbar">加载中...</div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:82px"  onclick="sortBy('name')">姓名 <span class="sort-arrow" id="sa-name"></span></th>
          <th style="width:68px"  onclick="sortBy('mbti')">MBTI <span class="sort-arrow" id="sa-mbti"></span></th>
          <th style="width:100px">Socionics</th>
          <th style="width:58px"  onclick="sortBy('e9')">九型 <span class="sort-arrow" id="sa-e9"></span></th>
          <th style="width:140px" onclick="sortBy('tritype')">Tritype <span class="sort-arrow" id="sa-tritype"></span></th>
          <th style="width:110px">本能副型</th>
          <th style="width:80px">态度类型</th>
          <th style="width:120px">爱之心理</th>
          <th style="width:72px">五行</th>
          <th style="width:130px">星座</th>
          <th style="width:62px"  onclick="sortBy('identity')">身份 <span class="sort-arrow" id="sa-identity"></span></th>
          <th style="width:32px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">添加条目</h2>
    <div class="form-row"><label>姓名 *</label><input id="f-name" type="text" placeholder="姓名"></div>
    <div class="form-row"><label>MBTI</label>
      <select id="f-mbti-sel">
        <option value="">—</option>
        <option>ENFP</option><option>INFP</option><option>ENFJ</option><option>INFJ</option>
        <option>ENTP</option><option>INTP</option><option>ENTJ</option><option>INTJ</option>
        <option>ESFP</option><option>ISFP</option><option>ESTP</option><option>ISTP</option>
        <option>ESFJ</option><option>ISFJ</option><option>ESTJ</option><option>ISTJ</option>
      </select>
    </div>
    <div class="form-row"><label>Socionics</label><input id="f-soc" type="text" placeholder="如 ILE"></div>
    <div class="form-row"><label>九型主型侧翼</label><input id="f-e9" type="text" placeholder="如 7w6"></div>
    <div class="form-row"><label>Tritype</label><input id="f-tritype" type="text" placeholder="如 748发动者"></div>
    <div class="form-row"><label>本能副型</label><input id="f-instinct" type="text" placeholder="如 so8, sx4, sx7"></div>
    <div class="form-row"><label>态度类型</label><input id="f-attitude" type="text" placeholder="如 E, F, L, V"></div>
    <div class="form-row"><label>爱之心理</label><input id="f-love" type="text" placeholder="爱之心理类型"></div>
    <div class="form-row"><label>身份</label>
      <select id="f-identity">
        <option value="">—</option>
        <option>明星</option><option>素人</option><option>网红</option><option>角色</option><option>作者</option>
      </select>
    </div>
    <div class="form-row"><label>五行日主</label><input id="f-wuxing" type="text" placeholder="如 壬, 水"></div>
    <div class="form-row"><label>星座</label><input id="f-xingzuo" type="text" placeholder="如 ⬆️处女, 水瓶, 🌕双鱼"></div>
    <div class="form-actions">
      <button onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="submitForm()">保存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  ★★★ 在这里填入你的 Supabase 配置 ★★★
// ============================================================
const SUPABASE_URL = 'https://snkamlofzhnlbcfnatcc.supabase.co'
const SUPABASE_KEY = 'sb_publishable_NM2_44Uz8Txp31YNzWKMpA_cHD53YRD'
// ============================================================

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

const MBTI_Y = new Set(['ESFP','ISFP','ISTP','ESTP'])
const MBTI_G = new Set(['ENFP','INFP','INFJ','ENFJ'])
const MBTI_P = new Set(['INTJ','ENTJ','INTP','ENTP'])
const MBTI_B = new Set(['ESFJ','ISFJ','ISTJ','ESTJ'])
function mbtiCls(m){ return MBTI_Y.has(m)?'mb-y':MBTI_G.has(m)?'mb-g':MBTI_P.has(m)?'mb-p':'mb-b' }
function idCls(id){ return {明星:'b-star',素人:'b-pub',网红:'b-net',角色:'b-role',作者:'b-wri'}[id]||'b-other' }
function splitTrim(s){ return (s||'').split(',').map(v=>v.trim()).filter(Boolean) }
function normStar(s){ return s.replace(/⬆️|🌕/g,'').trim() }
function getXx(soc){ const m=(soc||'').match(/[αβγδ]/); return m?m[0]:'' }
function getInst(s){ return splitTrim(s).map(v=>v.slice(0,2)).filter(v=>['so','sp','sx'].includes(v)) }

let allData = []
let sortCol = 'name', sortDir = 1
const filt = { shenfen:null, mbti:[], soctype:[], e9:[], inst:[], wx:[], star:[], attitude:[], love:[] }
let editId = null
let saveTimer = {}

// ── connection check ──
async function checkConn(){
  const dot = document.getElementById('conn-dot')
  const lbl = document.getElementById('conn-label')
  try {
    const { error } = await db.from('panjing').select('id').limit(1)
    if(error) throw error
    dot.className='dot'; lbl.textContent='已连接'
  } catch(e) {
    dot.className='dot offline'; lbl.textContent='连接失败 — 请检查配置'
  }
}

// ── load ──
async function loadData(){
  setStatus('加载中...')
  const { data, error } = await db.from('panjing').select('*').order('id')
  if(error){ setStatus('加载失败: '+error.message); return }
  allData = data
  if(allData.length === 0){
    document.getElementById('import-banner').style.display='flex'
  } else {
    document.getElementById('import-banner').style.display='none'
  }
  buildFilters()
  render()
  setStatus('已加载 '+allData.length+' 条 · '+new Date().toLocaleTimeString('zh-CN'))
}

// ── render ──
function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase()
  return allData.filter(r=>{
    if(filt.shenfen && r.identity !== filt.shenfen) return false
    if(filt.mbti.length && !filt.mbti.includes(r.mbti)) return false
    if(filt.soctype.length && !filt.soctype.some(s=>(r.soc||'').includes(s))) return false
    if(filt.e9.length && !filt.e9.includes(r.e9)) return false
    if(filt.inst.length){
      const ri = getInst(r.instinct)
      const ALL = ['so','sp','sx']
      const excluded = ALL.filter(f=>!filt.inst.includes(f))
      if(!filt.inst.every(f=>ri.includes(f))) return false
      if(excluded.some(f=>ri.includes(f))) return false
    }
    if(filt.wx.length   && !filt.wx.some(f=>(r.wuxing||'').includes(f))) return false
    if(filt.star.length && !filt.star.some(f=>splitTrim(r.xingzuo).map(normStar).includes(f))) return false
    if(filt.attitude.length && !filt.attitude.includes(r.attitude)) return false
    if(filt.love.length     && !filt.love.includes(r.love_psych)) return false
    if(q){
      const hay = [r.name,r.mbti,r.soc,r.e9,r.tritype,r.instinct,r.attitude,r.love_psych,r.identity,r.laizi].join(' ').toLowerCase()
      if(!hay.includes(q)) return false
    }
    return true
  }).sort((a,b)=>(a[sortCol]||'').localeCompare(b[sortCol]||'','zh')*sortDir)
}

function render(){
  const rows = getFiltered()
  const tbody = document.getElementById('tbody')
  tbody.innerHTML = ''
  rows.forEach(r=>{
    const tr = document.createElement('tr')
    const mc = mbtiCls(r.mbti)
    tr.innerHTML = `
      <td contenteditable="true" data-id="${r.id}" data-col="name"     title="${r.name||''}">${r.name||''}</td>
      <td class="td-mbti" data-id="${r.id}"><span class="mb ${mc}">${r.mbti||''}</span></td>
      <td contenteditable="true" data-id="${r.id}" data-col="soc"      title="${r.soc||''}">${r.soc||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="e9">${r.e9||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="tritype"  title="${r.tritype||''}">${r.tritype||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="instinct" title="${r.instinct||''}">${r.instinct||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="attitude">${r.attitude||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="love_psych" title="${r.love_psych||''}">${r.love_psych||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="wuxing" title="${r.wuxing||''}">${r.wuxing||''}</td>
      <td contenteditable="true" data-id="${r.id}" data-col="xingzuo" title="${r.xingzuo||''}">${r.xingzuo||''}</td>
      <td class="td-identity" data-id="${r.id}"><span class="badge ${idCls(r.identity)}">${r.identity||''}</span></td>
      <td><button class="del-btn" onclick="delRow(${r.id})">×</button></td>
    `
    tbody.appendChild(tr)
  })

  // inline edit — save on blur with 600ms debounce
  tbody.querySelectorAll('td[contenteditable]').forEach(td=>{
    td.addEventListener('blur', ()=>{
      const id  = +td.dataset.id
      const col = td.dataset.col
      const val = td.textContent.trim()
      // update local cache
      const rec = allData.find(r=>r.id===id)
      if(rec) rec[col] = val
      // debounce save
      clearTimeout(saveTimer[id+col])
      saveTimer[id+col] = setTimeout(()=>saveCell(id,col,val,td), 600)
    })
  })


  // MBTI inline select
  const MBTI_LIST = ['','ENFP','INFP','ENFJ','INFJ','ENTP','INTP','ENTJ','INTJ','ESFP','ISFP','ESTP','ISTP','ESFJ','ISFJ','ESTJ','ISTJ']
  const ID_LIST   = ['','明星','素人','网红','角色','作者']
  function makeSelect(td, list, col){
    const id = +td.dataset.id
    const rec = allData.find(r=>r.id===id)
    const cur = rec ? (rec[col]||'') : ''
    const sel = document.createElement('select')
    sel.style.cssText = 'font-size:12px;padding:2px 4px;border-radius:4px;border:1px solid #aaa;background:var(--bg);color:var(--text);width:100%;cursor:pointer'
    list.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v||'—'; if(v===cur)o.selected=true; sel.appendChild(o) })
    td.innerHTML = ''
    td.appendChild(sel)
    sel.size = Math.min(list.length, 8)
    sel.style.position = 'absolute'
    sel.style.zIndex = '999'
    sel.style.minWidth = '120px'
    sel.style.boxShadow = '0 4px 12px rgba(0,0,0,.15)'
    sel.style.borderRadius = '6px'
    sel.style.overflow = 'auto'
    sel.style.background = 'var(--bg)'
    function closeSelect(){ sel.size=1; sel.style.position=''; sel.style.zIndex=''; sel.style.boxShadow=''; document.removeEventListener('mousedown', outside) }
    function outside(e){ if(!sel.contains(e.target)){ closeSelect(); render() } }
    sel.onchange = async ()=>{
      const val = sel.value
      if(rec) rec[col] = val
      closeSelect()
      await saveCell(id, col, val, null)
      render()
    }
    setTimeout(()=>document.addEventListener('mousedown', outside), 50)
  }
  tbody.querySelectorAll('.td-mbti').forEach(td=>{
    td.style.cursor='pointer'
    td.onclick = ()=>makeSelect(td, MBTI_LIST, 'mbti')
  })
  tbody.querySelectorAll('.td-identity').forEach(td=>{
    td.style.cursor='pointer'
    td.onclick = ()=>makeSelect(td, ID_LIST, 'identity')
  })

  const byId = {}
  allData.forEach(r=>{ byId[r.identity]=(byId[r.identity]||0)+1 })
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${allData.length}</strong>总计</div>
    <div class="stat"><strong>${rows.length}</strong>筛选</div>
    <div class="stat"><strong>${byId['明星']||0}</strong>明星</div>
    <div class="stat"><strong>${byId['素人']||0}</strong>素人</div>
    <div class="stat"><strong>${byId['网红']||0}</strong>网红</div>
  `

  ;['name','mbti','e9','tritype','identity'].forEach(c=>{
    const el = document.getElementById('sa-'+c)
    if(el) el.textContent = sortCol===c ? (sortDir===1?'↑':'↓') : ''
  })
}

async function saveCell(id, col, val, td){
  td && td.classList.add('saving')
  const { error } = await db.from('panjing').update({[col]:val}).eq('id',id)
  td && td.classList.remove('saving')
  if(error){ setStatus('保存失败: '+error.message) }
  else { setStatus('已保存 · '+new Date().toLocaleTimeString('zh-CN')) }
}

// ── sort & filter ──
function sortBy(col){ sortCol===col ? sortDir*=-1 : (sortCol=col, sortDir=1); render() }

function buildFilters(){
  const mbtiVals = [...new Set(allData.map(r=>r.mbti).filter(Boolean))].sort()
  const e9Vals   = [...new Set(allData.map(r=>r.e9).filter(Boolean))].sort()
  bc('f-shenfen', ['明星','素人','网红','角色','作者'], 'shenfen', false)
  bc('f-mbti',    mbtiVals, 'mbti', true)
  const SOC_GROUPS = {
    'f-soc-a': ['ILE','SEI','ESE','LII'],
    'f-soc-b': ['SLE','IEI','EIE','LSI'],
    'f-soc-g': ['SEE','ILI','LIE','ESI'],
    'f-soc-d': ['IEE','SLI','LSE','EII'],
  }
  Object.entries(SOC_GROUPS).forEach(([cid, vals])=>{
    bc(cid, vals, 'soctype', true)
  })
  const E9_GUT   = ['1w2','1w9','8w7','8w9','9w1','9w8']
  const E9_HEART = ['2w1','2w3','3w2','3w4','4w3','4w5']
  const E9_HEAD  = ['5w4','5w6','6w5','6w7','7w6','7w8']
  bc('f-e9-gut',   E9_GUT,   'e9', true)
  bc('f-e9-heart', E9_HEART, 'e9', true)
  bc('f-e9-head',  E9_HEAD,  'e9', true)
  bc('f-inst',    ['so','sp','sx'], 'inst', true)
  bc('f-wx',      ['木','火','土','金','水'], 'wx', true)
  bc('f-star',    ['白羊','金牛','双子','巨蟹','狮子','处女','天秤','天蝎','射手','摩羯','水瓶','双鱼'], 'star', true)
  const attVals = [...new Set(allData.map(r=>r.attitude).filter(Boolean))].sort()
  const loveVals = [...new Set(allData.map(r=>r.love_psych).filter(Boolean))].sort()
  bc('f-attitude', attVals, 'attitude', true)
  bc('f-love',     loveVals, 'love', true)
}

function bc(containerId, vals, key, multi){
  const c = document.getElementById(containerId)
  if(!c) return
  c.innerHTML = ''
  vals.forEach(v=>{
    const d = document.createElement('span')
    d.className = 'chip' + (multi?' multi':'')
    d.textContent = v
    d.onclick = ()=>{
      if(multi){
        const arr=filt[key], idx=arr.indexOf(v)
        idx>=0 ? (arr.splice(idx,1), d.classList.remove('on')) : (arr.push(v), d.classList.add('on','multi'))
      } else {
        const was = filt[key]===v
        document.querySelectorAll('#'+containerId+' .chip').forEach(c=>c.classList.remove('on'))
        filt[key] = was ? null : v
        if(!was) d.classList.add('on')
      }
      render()
    }
    c.appendChild(d)
  })
}

function clearFilters(){
  Object.keys(filt).forEach(k=>{ Array.isArray(filt[k]) ? filt[k]=[] : filt[k]=null })
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'))
  document.getElementById('search').value=''
  render()
}

function openAdd(){ editId=null; clearForm(); document.getElementById('modal-title').textContent='添加条目'; document.getElementById('modal').classList.add('open') }
function closeModal(){ document.getElementById('modal').classList.remove('open') }
function clearForm(){
  ['name','soc','e9','tritype','instinct','attitude','love','wuxing','xingzuo'].forEach(f=>{ document.getElementById('f-'+f).value='' })
  document.getElementById('f-mbti-sel').value=''
  document.getElementById('f-identity').value=''
}

async function submitForm(){
  const name = document.getElementById('f-name').value.trim()
  if(!name){ alert('姓名不能为空'); return }
  const row = {
    name, mbti: document.getElementById('f-mbti-sel').value,
    soc: document.getElementById('f-soc').value.trim(),
    e9:  document.getElementById('f-e9').value.trim(),
    tritype:  document.getElementById('f-tritype').value.trim(),
    instinct: document.getElementById('f-instinct').value.trim(),
    attitude: document.getElementById('f-attitude').value.trim(),
    love_psych: document.getElementById('f-love').value.trim(),
    identity: document.getElementById('f-identity').value,
    wuxing:   document.getElementById('f-wuxing').value.trim(),
    xingzuo:  document.getElementById('f-xingzuo').value.trim(),
  }
  const { data: inserted, error } = await db.from('panjing').insert(row).select()
  if(error){ alert('保存失败: '+error.message); return }
  if(inserted && inserted.length) allData.push(inserted[0])
  closeModal()
  buildFilters()
  render()
  setStatus('已保存 · '+new Date().toLocaleTimeString('zh-CN'))
}

async function delRow(id){
  if(!confirm('确认删除？')) return
  const { error } = await db.from('panjing').delete().eq('id',id)
  if(error){ alert('删除失败: '+error.message); return }
  allData = allData.filter(r=>r.id!==id)
  render()
  setStatus('已删除 · '+new Date().toLocaleTimeString('zh-CN'))
}

async function importInitial(){
  setStatus('导入中...')
  const { error } = await db.from('panjing').insert(INITIAL)
  if(error){ setStatus('导入失败: '+error.message); return }
  document.getElementById('import-banner').style.display='none'
  loadData()
}

function setStatus(msg){ document.getElementById('statusbar').textContent = msg }

// ── init ──
document.getElementById('search').addEventListener('input', render)
checkConn()
migrateData().then(()=>loadData())

async function migrateData(){
  // 把数据库里残留的"作家"改为"作者"
  await db.from('panjing').update({identity:'作者'}).eq('identity','作家')
  // 五行格式迁移：把"X, Y"改为"XY"
  const { data: wxRows } = await db.from('panjing').select('id, wuxing').like('wuxing', '%, %')
  if(wxRows){ for(const r of wxRows){ const parts=r.wuxing.split(',').map(s=>s.trim()); if(parts.length===2) await db.from('panjing').update({wuxing:parts.join('')}).eq('id',r.id) } }
  // 重排星座顺序：无emoji → 🌕 → ⬆️
  const { data } = await db.from('panjing').select('id, xingzuo').not('xingzuo', 'is', null).neq('xingzuo', '')
  if(!data) return
  const updates = []
  data.forEach(r=>{
    const parts = (r.xingzuo||'').split(',').map(s=>s.trim()).filter(Boolean)
    if(parts.length < 2) return
    const sun=[], moon=[], rising=[]
    parts.forEach(p=>{ if(p.includes('🌕')) moon.push(p); else if(p.includes('⬆️')) rising.push(p); else sun.push(p) })
    const reordered = [...sun, ...moon, ...rising].join(', ')
    if(reordered !== r.xingzuo) updates.push({id: r.id, xingzuo: reordered})
  })
  for(const u of updates){ await db.from('panjing').update({xingzuo: u.xingzuo}).eq('id', u.id) }
}
</script>
